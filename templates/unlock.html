<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shani Store - Access Unlock Karein</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#0b1120;
  min-height:100vh;
  color:white;
  padding:20px;
}

.container{
  max-width:460px;
  margin:auto;
}

/* HEADER */

.header{
  text-align:center;
  padding:20px 0 24px;
}

.header h1{
  font-size:1.8rem;
  font-weight:800;
  background:linear-gradient(135deg,#7c3aed,#3b82f6);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.header p{
  color:#64748b;
  font-size:0.9rem;
  margin-top:6px;
}

/* PAYMENT CARD */

.pay-card{
  background:#1e293b;
  border:2px solid #7c3aed;
  border-radius:20px;
  padding:24px;
  margin-bottom:20px;
  text-align:center;
}

.price-badge{
  display:inline-block;
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  padding:8px 24px;
  border-radius:50px;
  font-size:1.5rem;
  font-weight:800;
  margin-bottom:16px;
}

.duration{
  color:#94a3b8;
  font-size:0.85rem;
  margin-bottom:20px;
}

.pay-detail{
  background:#0f172a;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}

.label{
  font-size:11px;
  color:#64748b;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:6px;
}

.value{
  font-size:1.2rem;
  font-weight:700;
  color:#4ade80;
}

.value.number{
  font-size:1.5rem;
  color:#60a5fa;
  letter-spacing:2px;
}

/* BUTTON */

.video-how-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#dc2626,#b91c1c);
  border:none;
  border-radius:14px;
  color:white;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:0.3s;
}

.video-how-btn:hover{
  transform:translateY(-2px);
}

/* MODAL */

.modal-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.88);
  z-index:1000;
  justify-content:center;
  align-items:center;
}

.modal-overlay.active{
  display:flex;
}

.modal-box{
  background:#1e293b;
  border-radius:18px;
  padding:20px;
  max-width:380px;
  width:90%;
  text-align:center;
  border:1px solid #334155;
}

.modal-box iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:12px;
  margin-bottom:14px;
}

.modal-box p{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:14px;
}

.modal-close{
  background:#dc2626;
  color:white;
  border:none;
  padding:10px 22px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🔓 Access Unlock Karein</h1>
    <p>30 din ke liye FF Emote Panel use karein</p>
  </div>

  <!-- PAYMENT CARD -->

  <div class="pay-card">

    <div class="price-badge">
      Rs. 300
    </div>

    <div class="duration">
      📅 30 Din ke Liye Unlock
    </div>

    <div class="pay-detail">
      <div class="label">Easypaisa Number</div>
      <div class="value number">03179537719</div>
    </div>

    <div class="pay-detail">
      <div class="label">Account Name</div>
      <div class="value">MUHAMMAD SHAYAN KHAN</div>
    </div>

    <div class="pay-detail">
      <div class="label">Payment Method</div>
      <div class="value">📱 EASYPAISA</div>
    </div>

  </div>

  <!-- VIDEO BUTTON -->

  <button class="video-how-btn" onclick="openKolneVideo()">

    <i class="fas fa-play-circle"></i>

    Kolne Ka Tarika — Video Dekhein

  </button>

</div>

<!-- VIDEO MODAL -->

<div class="modal-overlay" id="kolneModal">

  <div class="modal-box">

    <iframe
      id="kolneFrame"
      src=""
      allow="autoplay; fullscreen"
      allowfullscreen
      referrerpolicy="no-referrer">
    </iframe>

    <p>
      Yeh video dekh kar samjhein ke Easypaisa par payment kaise karein
    </p>

    <button class="modal-close" onclick="closeKolneVideo()">

      Close ✕

    </button>

  </div>

</div>

<script>

/* =========================
   OPEN VIDEO MODAL
========================= */

function openKolneVideo(){

  // STREAMABLE EMBED URL
  const embedUrl = "https://streamable.com/e/s0zv09";

  // SET VIDEO
  document.getElementById("kolneFrame").src = embedUrl;

  // SHOW MODAL
  document.getElementById("kolneModal").classList.add("active");
}

/* =========================
   CLOSE VIDEO MODAL
========================= */

function closeKolneVideo(){

  // STOP VIDEO
  document.getElementById("kolneFrame").src = "";

  // HIDE MODAL
  document.getElementById("kolneModal").classList.remove("active");
}

/* =========================
   CLOSE ON OUTSIDE CLICK
========================= */

document
.getElementById("kolneModal")
.addEventListener("click", function(e){

  if(e.target === this){

    closeKolneVideo();

  }

});

</script>

</body>
</html>
